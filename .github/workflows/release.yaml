name: Build and Release

env:
  NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: oven-sh/setup-bun@v2

    - id: tag
      uses: ietf-tools/semver-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: main
        noVersionBumpBehavior: patch
        noNewCommitBehavior: current

    - run: bun i && bun run build

    - uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - run: echo "IMAGE_NAME=ghcr.io/${{github.repository}}:${{ steps.tag.outputs.nextStrict }}" >> $GITHUB_ENV

    - uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: ${{ env.IMAGE_NAME }}

    outputs:
      image_name: ${{ env.IMAGE_NAME }}

  release:
    needs: build
    runs-on: on-prem
    env:
      DEPLOYMENT: ${{ github.event.repository.name }}
    steps:
    - name: Perform rolling update
      run: |
        kubectl set image deployment/${DEPLOYMENT} ${DEPLOYMENT}=${{ needs.build.outputs.image_name }} -n default
        kubectl rollout status deployment/${DEPLOYMENT} -n default
